<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }

        /* NAVBAR */
        nav {
            background: #222;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav .logo {
            color: #fff;
            font-size: 22px;
            font-weight: bold;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 25px;
        }

        nav ul li a {
            color: #fff;
            text-decoration: none;
            font-size: 16px;
            transition: 0.3s;
        }

        nav ul li a:hover {
            color: #00bcd4;
        }

        /* GALLERY SECTION */
        .gallery-container {
            padding: 40px;
            text-align: center;
        }

        .gallery-container h1 {
            font-size: 36px;
            margin-bottom: 20px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        .gallery-grid img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 8px;
            transition: 0.3s;
        }

        .gallery-grid img:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* FOOTER */
        footer {
            background: #222;
            color: #fff;
            text-align: center;
            padding: 15px;
            margin-top: 40px;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <nav>
        <div class="logo">Your Name</div>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">About Us</a></li>
            <li><a href="#">Projects</a></li>
            <li><a href="#">Gallery</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <!-- GALLERY -->
    <div class="gallery-container">
        <h1>Gallery</h1>

        <div class="gallery-grid">
            <img src="https://picsum.photos/400/300?random=1" alt="">
            <img src="https://picsum.photos/400/300?random=2" alt="">
            <img src="https://picsum.photos/400/300?random=3" alt="">
            <img src="https://picsum.photos/400/300?random=4" alt="">
            <img src="https://picsum.photos/400/300?random=5" alt="">
            <img src="https://picsum.photos/400/300?random=6" alt="">
            <img src="https://picsum.photos/400/300?random=7" alt="">
            <img src="https://picsum.photos/400/300?random=8" alt="">
        </div>
    </div>

    <!-- FOOTER -->
    <footer>
        © 2024 Your Name — Full Stack Developer
    </footer>

</body>
</html>
