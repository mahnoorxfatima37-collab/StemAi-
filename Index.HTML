<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cinematic Gallery</title>

<style>
    body {
        margin: 0;
        background: #0a0a0a;
        font-family: Arial, sans-serif;
        color: #fff;
        overflow-x: hidden;
    }

    /* NAVBAR */
    nav {
        position: fixed;
        top: 0;
        width: 100%;
        padding: 20px 50px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        z-index: 1000;
        background: rgba(0,0,0,0.4);
        backdrop-filter: blur(10px);
    }

    nav .logo {
        font-size: 26px;
        font-weight: bold;
        color: #00eaff;
        letter-spacing: 1px;
        text-shadow: 0 0 10px #00eaff;
    }

    nav ul {
        list-style: none;
        display: flex;
        gap: 30px;
    }

    nav ul li a {
        color: #fff;
        text-decoration: none;
        font-size: 17px;
        transition: 0.3s;
        padding-bottom: 5px;
    }

    nav ul li a:hover {
        color: #00eaff;
        text-shadow: 0 0 10px #00eaff;
        border-bottom: 2px solid #00eaff;
    }

    /* HERO SECTION */
    .hero {
        height: 100vh;
        background-image: url('YOUR_IMAGE_HERE.jpg');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
    }

    .hero h1 {
        font-size: 60px;
        text-shadow: 0 0 20px #000;
        animation: fadeIn 2s ease;
    }

    /* SECTION TITLE */
    .section-title {
        text-align: center;
        margin-top: 80px;
        font-size: 40px;
        text-shadow: 0 0 10px #00eaff;
        animation: fadeIn 1.5s ease;
    }

    /* GALLERY */
    .gallery {
        padding: 50px;
        columns: 3;
        column-gap: 20px;
    }

    .gallery img {
        width: 100%;
        margin-bottom: 20px;
        border-radius: 10px;
        cursor: pointer;
        transition: 0.3s;
        opacity: 0;
        transform: translateY(20px);
    }

    .gallery img:hover {
        transform: scale(1.03);
        box-shadow: 0 0 20px rgba(0,255,255,0.4);
    }

    /* LIGHTBOX */
    .lightbox {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0,0,0,0.9);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 2000;
    }

    .lightbox img {
        width: 80%;
        max-width: 900px;
        border-radius: 10px;
        box-shadow: 0 0 25px #00eaff;
    }

    /* FOOTER */
    footer {
        background: #000;
        text-align: center;
        padding: 20px;
        margin-top: 40px;
        color: #aaa;
        border-top: 1px solid #111;
    }

    /* ANIMATIONS */
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* RESPONSIVE */
    @media (max-width: 900px) {
        .gallery { columns: 2; }
        .hero h1 { font-size: 45px; }
    }

    @media (max-width: 600px) {
        .gallery { columns: 1; }
        .hero h1 { font-size: 35px; }
    }
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
    <div class="logo">Your Name</div>
    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Gallery</a></li>
        <li><a href="#">Projects</a></li>
        <li><a href="#">Contact</a></li>
    </ul>
</nav>

<!-- HERO -->
<div class="hero">
    <h1>Cinematic Gallery</h1>
</div>

<!-- TITLE -->
<div class="section-title">Featured Works</div>

<!-- GALLERY -->
<div class="gallery">
    <img src="https://picsum.photos/500/700?random=1">
    <img src="https://picsum.photos/500/650?random=2">
    <img src="https://picsum.photos/500/600?random=3">
    <img src="https://picsum.photos/500/700?random=4">
    <img src="https://picsum.photos/500/650?random=5">
    <img src="https://picsum.photos/500/600?random=6">
</div>

<!-- LIGHTBOX -->
<div class="lightbox" onclick="closeLightbox()">
    <img id="lightbox-img">
</div>

<script>
    /* LIGHTBOX */
    const galleryImages = document.querySelectorAll('.gallery img');
    const lightbox = document.querySelector('.lightbox');
    const lightboxImg = document.getElementById('lightbox-img');

    galleryImages.forEach(img => {
        img.addEventListener('click', () => {
            lightbox.style.display = 'flex';
            lightboxImg.src = img.src;
        });
    });

    function closeLightbox() {
        lightbox.style.display = 'none';
    }

    /* SCROLL FADE-IN */
    const observer = new IntersectionObserver(entries => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.style.opacity = 1;
                entry.target.style.transform = "translateY(0)";
            }
        });
    }, { threshold: 0.2 });

    document.querySelectorAll('.gallery img').forEach(img => {
        observer.observe(img);
    });
</script>

<!-- FOOTER -->
<footer>
    © 2024 Your Name — Cinematic Portfolio
</footer>

</body>
</html>
